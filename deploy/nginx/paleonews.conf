# PaleoNews nginx 사이트 설정 — /etc/nginx/sites-available/paleonews.conf 에 설치.
# 배포 중 점검 페이지(배포·데이터 계약 maintenance flag) 포함. fsis2026 동형.
#
# 설치(root 필요):
#   sudo cp /etc/nginx/sites-available/paleonews.conf /etc/nginx/sites-available/paleonews.conf.bak
#   sudo cp deploy/nginx/paleonews.conf /etc/nginx/sites-available/paleonews.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# 점검 페이지 파일은 /srv/paleonews/{maintenance.html,maintenance_planned.html} (이미지 self-heal 로 유지).
# flag 는 매 요청마다 -f 평가 → 토글만으로 즉시 반영(reload 불요):
#   deploy.sh 가 배포 중 maintenance.flag 자동 토글(스왑 전 touch, 완료 후 trap EXIT 제거)
#   수동/예고: /srv/paleonews/maintenance.sh {short|planned "<복귀>" "<사유>"|off|status}

upstream paleonews {
    server 127.0.0.1:8100;
}

server {
    listen      8080;
    server_name _;
    charset     utf-8;

    location / {
        # planned 가 short 보다 우선(위→아래, 첫 return 에서 종료).
        if (-f /srv/paleonews/maintenance_planned.flag) { return 530; }
        if (-f /srv/paleonews/maintenance.flag)         { return 503; }

        proxy_pass http://paleonews;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 컨테이너가 flag 없이 내려가(connection refused → 502/504)도 점검 페이지로 정규화.
    # proxy_intercept_errors 는 켜지 않는다 — 앱이 반환하는 503(/healthz DB 실패)은 그대로 통과.
    error_page 502 504 =503 /maintenance.html;
    error_page 503        /maintenance.html;
    error_page 530 =503   /maintenance_planned.html;   # 530 → 503 normalize

    location = /maintenance.html         { root /srv/paleonews; internal; }
    location = /maintenance_planned.html { root /srv/paleonews; internal; }
}
