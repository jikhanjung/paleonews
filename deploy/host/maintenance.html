<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta http-equiv="refresh" content="10">
<meta name="robots" content="noindex">
<title>PaleoNews 시스템 업데이트 중</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "맑은 고딕", "Malgun Gothic", sans-serif;
    display: flex;
    min-height: 100vh;
    margin: 0;
    align-items: center;
    justify-content: center;
    background: #f5f5f7;
    color: #222;
  }
  .box {
    text-align: center;
    padding: 2rem 3rem;
    max-width: 32rem;
  }
  h1 {
    font-size: 1.5rem;
    margin: 0 0 1rem;
    font-weight: 600;
  }
  p {
    margin: 0.25rem 0;
    line-height: 1.7;
    color: #555;
  }
  .countdown {
    margin-top: 1.5rem;
    font-size: 0.875rem;
    color: #888;
  }
  .countdown strong {
    color: #555;
    font-weight: 600;
  }
</style>
</head>
<body>
  <div class="box">
    <h1>시스템 업데이트 중입니다</h1>
    <p>PaleoNews 를 새 버전으로 배포하고 있습니다.</p>
    <p>잠시 후 자동으로 다시 연결됩니다.</p>
    <p class="countdown"><strong id="countdown">10</strong>초 후 자동 새로고침</p>
  </div>
  <script>
    (function () {
      var n = 10;
      var el = document.getElementById('countdown');
      var t = setInterval(function () {
        n -= 1;
        if (n <= 0) { clearInterval(t); location.reload(); return; }
        el.textContent = n;
      }, 1000);
    })();
  </script>
</body>
</html>
