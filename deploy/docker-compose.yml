# 운영 배포: 단일 컨테이너 "all" 모드 (entrypoint.sh = cron + Telegram bot + web).
# scripts/release.sh 가 이 파일을 /srv/paleonews 로 복사한 뒤 그곳에서 deploy.sh 를 실행한다.
# .env / config.yaml / claude / data / logs 는 호스트 고유 상태이며 동기화 대상이 아니다.
services:
  paleonews:
    image: honestjung/paleonews:${TAG:-latest}
    container_name: paleonews
    command: ["all"]
    env_file: .env
    environment:
      - PIPELINE_CRON=${PIPELINE_CRON:-0 23 * * *}
    ports:
      - "127.0.0.1:8100:8000"
    volumes:
      - ${DATA_DIR:-/srv/paleonews/data}:/app/data
      - ${LOG_DIR:-/srv/paleonews/logs}:/app/logs
      - ./config.yaml:/app/config.yaml:ro
      - ./claude:/root/.claude
    restart: unless-stopped
