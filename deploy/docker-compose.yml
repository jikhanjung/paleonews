services:
  # 파이프라인 cron (매일 08:00 KST 실행)
  pipeline:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    command: ["run"]
    env_file: ../.env
    volumes:
      - paleonews-data:/app/data
      - paleonews-logs:/app/logs
    restart: "no"

  # Telegram 봇 데몬 (상시 실행)
  bot:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    command: ["bot"]
    env_file: ../.env
    volumes:
      - paleonews-data:/app/data
      - paleonews-logs:/app/logs
    restart: unless-stopped

  # 웹 관리 UI (상시 실행)
  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    command: ["web", "--host", "0.0.0.0", "--port", "8000"]
    env_file: ../.env
    ports:
      - "${WEB_PORT:-8000}:8000"
    volumes:
      - paleonews-data:/app/data
      - paleonews-logs:/app/logs
    restart: unless-stopped

volumes:
  paleonews-data:
  paleonews-logs:
