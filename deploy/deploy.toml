# PaleoNews 배포 매니페스트 — 배포·데이터 계약 선언층.
# 프로젝트별 배포 지식을 기억이 아니라 이 파일에 고정한다. 단일 오케스트레이터(또는
# Claude Code)가 프로젝트 지식 없이 이 매니페스트만 읽고 배포·검증할 수 있게 하는 것이 목표.
# 근거: ../devdocs/wiki/deploy-data-contract.md · ../DEPLOY.md · deploy/README.md.
#
# 스택: Django 가 아니라 FastAPI + CLI + raw sqlite3. 단일 컨테이너 "all" 모드
# (cron 파이프라인 + Telegram bot + web admin). Django 마이그레이션 없음 —
# db.py:_migrate() 가 컨테이너 기동 시 자동(가산 컬럼만, 하위호환).

contract_version = 1               # 이 매니페스트가 따르는 배포·데이터 계약 판(필드·동사 의미 변경 시 증가).
instance = "paleonews"
image    = "honestjung/paleonews"          # Docker Hub. build.sh 가 :X.Y.Z + :latest push.
target   = "m710q"                          # **운영 호스트 = 빌드 호스트(m710q, 집)**. 대부분 프로젝트와 달리
                                            # 원격 GCP 가 아니라 로컬 자기호스팅 — 배포는 로컬 실행(ssh 불요).
                                            # 단일 인스턴스(다중 인스턴스 아님). 컨테이너는 root 로 실행(cron·/root/.claude 요구).
db_path  = "/srv/paleonews/data/paleonews.db"   # 호스트 DB 전용 디렉터리(/srv/paleonews/data) → 컨테이너 /app/data 로 바인드(디렉터리 마운트, WAL 형제 동반).
has_seed = false                            # 시스템 시드 레인 없음 — 전 테이블이 운영 데이터
                                            # (articles/dispatches/users/memories/feeds/app_settings).
                                            # 불변식은 seed 명령의 부재로 성립. 안전망 = 백업(scripts/backup_db.py).
                                            # feeds 는 원래 sources.txt(개발자 목록)였으나 이제 웹/CLI 로 운영자 관리 = 운영 데이터.
services = ["paleonews"]                    # compose 단일 서비스("all" 모드 = cron+bot+web 한 컨테이너).
rollback_db = "keep"               # rollback 기본 DB 정책: keep(이미지만 전환·운영 데이터 보존) | restore(스냅샷 복원).
                                   # keep 이 기본 — DB 복원은 배포 후 운영 입력분을 지우므로 명시적 opt-in(rollback.sh --db=restore).

# 헬스체크. /healthz = 버전 + DB + 핵심 행 수(articles/feeds/users). smoke 가 소비, deploy.sh 가 자동 호출.
health_url   = "/healthz"
health_probe = "http://127.0.0.1:8100/healthz"   # 컨테이너 웹은 nginx 뒤 admin UI (SSL 리다이렉트 없음 → 헤더 불요).

# 배포 동사(계약 이름 → 현 구현). deploy 는 git-free — 이미지에서 host 파일 추출(self-heal).
[verbs]
preflight = "deploy/preflight.sh [<since-ref>]"             # 빌드 호스트: 위험 표면 diff + seed 냄새 lint + DEPLOY.md
build     = "deploy/build.sh X.Y.Z [--fast]"               # 빌드 호스트: test + bump(pyproject) + build + push
deploy    = "/srv/paleonews/deploy-prod.sh X.Y.Z"           # (로컬 실행) 추출 → 스냅샷 → 스왑 → (기동=자동 migrate) → DB게이트+쓰기프로브 → smoke
remote    = "deploy/remote-prod.sh X.Y.Z"                   # ssh 래퍼(parity용). prod=빌드 호스트라 실사용은 로컬 deploy-prod.sh.
seed      = "(없음)"                                          # has_seed=false — seed 명령 부재로 불변식 성립. preflight 가 seed_* 존재를 냄새로 플래그.
smoke     = "/srv/paleonews/smoke.sh [X.Y.Z]"               # 대상 호스트: healthz 200 + 버전 일치 + counts 존재
rollback  = "/srv/paleonews/rollback.sh <이전 X.Y.Z> [--db=keep|restore]"  # 코드/DB 분리: keep(기본, 이미지만 전환·운영 데이터 보존)·restore(정지 후 스냅샷 복원)
bootstrap = "deploy/sync_to_srv.sh"                         # repo 머신 1회: 호스트 래퍼 설치(이후 self-heal)

# --- 환경 ---
# **prod = 빌드 호스트(m710q)**. 이미지를 로컬에서 build/push 하고 같은 호스트가 소비(로컬 배포).
# repo(~/projects/paleonews)와 배포 디렉터리(/srv/paleonews)는 같은 머신이지만 분리돼 있어
# git-free 원칙(운영 디렉터리에 repo 체크아웃 없음)은 그대로 성립.
[targets.prod]
host     = "m710q"                          # 로컬 자기호스팅(집). 빌드 호스트와 동일 머신.
entry    = "/srv/paleonews/deploy-prod.sh"  # DEPLOY_SNAPSHOT=1 — 스왑 직전 원자적 DB 스냅샷. 로컬 실행.
snapshot = true
expose   = "127.0.0.1:8100"                 # 공인 IP 직접 노출 금지, nginx 경유만.
data_dir = "/srv/paleonews"                 # data/(DB, jikhanjung 소유), logs/, .env, config.yaml, claude/, backup/, scripts/backup_db.py
run_as   = "root"                           # 컨테이너는 root — data 디렉터리(jikhanjung 소유)에도 DAC 우회로 쓰기 가능. gosu 는 dormant.
# 배포: (m710q 로컬) /srv/paleonews/deploy-prod.sh X.Y.Z  또는 scripts/release.sh X.Y.Z
